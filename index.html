<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 Excel AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>🤖 Excel AI</h1>
      <div class="header-controls">
        <div id="model-selector"></div>
        <div id="theme-toggle"></div>
        <button id="settings-btn" title="Configuración">⚙️</button>
      </div>
    </header>
    
    <div class="toolbar">
      <button class="toolbar-btn" data-cmd="analyze" title="Ctrl+Shift+A">📊 Analizar</button>
      <button class="toolbar-btn" data-cmd="explain" title="Ctrl+Shift+E">📝 Explicar</button>
      <button class="toolbar-btn" data-cmd="fix" title="Ctrl+Shift+F">🐛 Corregir</button>
      <button class="toolbar-btn" data-cmd="summarize" title="Ctrl+Shift+S">📋 Resumir</button>
      <button class="toolbar-btn" id="cmd-palette-btn" title="Ctrl+K">⌘ Paleta</button>
    </div>
    
    <div class="privacy-bar">
      <label>
        <input type="checkbox" id="privacy-toggle" checked>
        🔒 Privacidad
      </label>
      <span class="status-text" id="status">🟢 Listo</span>
    </div>
    
    <div class="chat-container" id="chat-container">
      <div class="welcome-message">
        <h2>Bienvenido a Excel AI 🤖</h2>
        <p>Tu asistente de IA integrado en Excel</p>
        <p class="shortcut-hint">Usa <kbd>Ctrl+K</kbd> paraCommands rápidos</p>
        <div class="quick-actions">
          <button class="quick-btn" data-prompt="Analiza esta hoja de cálculo">📊 Analizar datos</button>
          <button class="quick-btn" data-prompt="Explica esta fórmula">📝 Explicar fórmula</button>
          <button class="quick-btn" data-prompt="Corrige errores en esta hoja">🐛 Corregir errores</button>
        </div>
      </div>
      <div id="messages"></div>
    </div>
    
    <div class="citations-bar" id="cell-citations"></div>
    
    <div class="input-container">
      <textarea id="user-input" placeholder="Pregunta o describe lo que necesitas..." rows="2"></textarea>
      <button id="send-btn">Enviar</button>
    </div>
    
    <footer class="status-bar">
      <span id="model-display">Modelo: OpenCode</span>
      <span id="version">v2.1</span>
    </footer>
  </div>
  
  <!-- Components -->
  <script  src="components/model-selector.js"></script>
  <script  src="components/theme-toggle.js"></script>
  <script  src="components/command-palette.js"></script>
  <script  src="components/diff-preview.js"></script>
  <script  src="components/cell-citations.js"></script>
  <script  src="components/audit-log.js"></script>
  <script src="assets/app.bundle.js?v=20260505b"></script>
</body>
</html>
