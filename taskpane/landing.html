<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Excel AI Add-in</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 50px auto; text-align: center; padding: 20px; }
    h1 { color: #10b981; }
    .btn { background: #10b981; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 10px; }
    .btn:hover { background: #059669; }
    .info { background: #f3f4f6; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: left; }
    code { background: #e5e7eb; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🤖 Excel AI Add-in</h1>
  <p>Tu asistente de IA integrado en Microsoft Excel</p>
  
  <div class="info">
    <h3>📋 Instrucciones de instalación</h3>
    <ol>
      <li>Abre Microsoft Excel</li>
      <li>Ve a <strong>Insertar → Mis Complementos</strong></li>
      <li>Elige <strong>Cargar complemento desde archivo</strong></li>
      <li>Selecciona el archivo <code>manifest.xml</code> de esta carpeta</li>
    </ol>
  </div>
  
  <button class="btn" onclick="window.open('index.html', '_blank')">🧪 Probar Panel</button>
</body>
</html>
